<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大師級麵團計算機 v13</title>
    
    <link rel="icon" type="image/png" href="bread-icon.png">
    <link rel="apple-touch-icon" href="bread-icon.png">
    
    <style>
        :root { --primary: #2b1d1a; --accent: #d84315; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #333; display: flex; justify-content: center; padding: 10px; }
        .container { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 650px; width: 100%; }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin: 0 0 15px 0; font-size: 1.4rem; }
        .section { margin-bottom: 15px; padding: 12px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
        .section-title { font-size: 0.85rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; border-left: 4px solid var(--accent); padding-left: 8px; }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
        .input-item { flex: 1; min-width: 100px; margin-bottom: 8px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; color: #666; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
        .method-toggle { display: flex; background: #eee; border-radius: 6px; padding: 3px; margin-bottom: 10px; }
        .method-toggle label { flex: 1; text-align: center; cursor: pointer; padding: 6px; margin: 0; font-size: 0.85rem; }
        .method-toggle input { display: none; }
        .method-toggle input:checked + span { background: var(--primary); color: white; display: block; border-radius: 4px; padding: 6px; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .status-card { background: #fdf5e6; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #f3e5f5; position: relative; }
        .status-label { font-size: 0.65rem; color: #795548; }
        .status-value { font-weight: bold; font-size: 0.85rem; color: var(--primary); }
        .result-box { background: #fff3e0; padding: 15px; border-radius: 8px; border: 2px solid #ffe0b2; margin-top: 15px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .highlight { color: var(--accent); font-weight: 800; font-size: 1.4rem; }
        .warn { color: #d32f2f; font-size: 0.7rem; background: #ffebee; padding: 5px; border-radius: 4px; display: none; margin-top: 5px; }
        
        /* 湯種配方提示 */
        .recipe-hint { background: #e8f5e9; color: #2e7d32; font-size: 0.8rem; padding: 8px; border-radius: 6px; margin-top: 5px; display: none; border: 1px dashed #a5d6a7; }
        
        /* 計時器樣式 */
        .timer-btn { width: 100%; background: #4caf50; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .timer-btn:active { background: #388e3c; }
        .timer-display { text-align: center; font-size: 0.85rem; color: #d84315; font-weight: bold; margin-top: 8px; display: none; }
        .badge { font-size: 0.65rem; background: #ffe0b2; color: #e65100; padding: 2px 4px; border-radius: 4px; margin-left: 5px; font-weight:normal; }
    </style>
</head>
<body>

<div class="container">
    <h2>麵團全功能計算機 v13</h2>

    <div class="section" style="background: #fdfaf6;">
        <div class="section-title">情境快選</div>
        <select id="preset" onchange="applyPreset()">
            <option value="custom">-- 自定義模式 --</option>
            <option value="baguette">法棍 (Poolish / 72% 水)</option>
            <option value="sourdough">歐包 (Levain / 80% 水 / 有蓋)</option>
            <option value="toast">湯種生吐司 (5%湯種 / 70% 水 / 高奶油)</option>
            <option value="anpan">紅豆麵包 (包入 40g 餡 / 65% 水)</option>
            <option value="mantou">老麵饅頭 (蒸)</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title">生產目標與餡料設定</div>
        <div class="flex-row">
            <div class="input-item" style="flex:2;"><label>單個成品目標總重 (g)</label><input type="number" id="unitWeight" value="100" oninput="calculate()"></div>
            <div class="input-item"><label>數量</label><input type="number" id="qty" value="6" oninput="calculate()"></div>
            <div class="input-item" style="flex:1.5;"><label>每顆包入餡料重 (g)</label><input type="number" id="wrapFillingPer" value="0" oninput="calculate()"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">烘焙方式與環境</div>
        <div class="method-toggle">
            <label><input type="radio" name="method" id="modeBake" value="bake" checked onclick="toggleMethod()"><span>烤 (Bake)</span></label>
            <label><input type="radio" name="method" id="modeSteam" value="steam" onclick="toggleMethod()"><span>蒸 (Steam)</span></label>
        </div>
        <div id="bakePanel" class="flex-row">
            <div class="input-item"><label>環境氣溫 (°C)</label><input type="number" id="envTemp" value="26" oninput="calculate()"></div>
            <div class="input-item"><label>溫度 (°C)</label><input type="number" id="temp" value="180" oninput="calculate()"></div>
            <div class="input-item"><label>時間 (min)</label><input type="number" id="time" value="15" oninput="calculate()"></div>
            <div class="input-item" style="flex:0.5; text-align:center;"><label>有蓋</label><input type="checkbox" id="lidded" onchange="calculate()" style="width:18px; height:18px;"></div>
        </div>
        <div id="steamPanel" style="display:none;" class="input-item">
            <label>蒸煮時間 (min)</label><input type="number" id="steamTime" value="15" oninput="calculate()">
        </div>
    </div>

    <div class="section" style="background: #f1f8e9;">
        <div class="section-title">種麵與燙麵 (Pre-ferments & Roux)</div>
        <div class="flex-row">
            <div class="input-item"><label>魯邦種 1:1 (g)</label><input type="number" id="levain" value="0" oninput="calculate()"></div>
            <div class="input-item"><label>Poolish/Biga (g)</label><input type="number" id="poolish" value="0" oninput="calculate()"></div>
            <div class="input-item" style="flex:0.6;"><label>其含水 %</label><input type="number" id="poolishHydro" value="100" oninput="calculate()"></div>
        </div>
        <div class="flex-row" style="margin-top:5px;">
            <div class="input-item"><label>老麵 (g)</label><input type="number" id="oldDough" value="0" oninput="calculate()"></div>
            <div class="input-item" style="flex:0.6;"><label>其含水 %</label><input type="number" id="oldDoughHydro" value="65" oninput="calculate()"></div>
        </div>
        <hr style="border: 0.5px dashed #c5e1a5; margin: 10px 0;">
        <div class="flex-row">
            <div class="input-item" style="flex:1.2;"><label>下缸熟湯種重 (g)</label><input type="number" id="tangzhong" value="0" oninput="calculate()"></div>
            <div class="input-item" style="flex:1;"><label>生料含水 %<br><small>(1:5 = 500%)</small></label><input type="number" id="tzHydro" value="500" oninput="calculate()"></div>
            <div class="input-item" style="flex:1.5; font-size:0.7rem; color:#558b2f; align-self:center;" id="tzSuggestDisp">建議佔總粉5~10%</div>
        </div>
        <div id="tzRecipeDisp" class="recipe-hint"></div>
    </div>

    <div class="section">
        <div class="section-title">配方比例與拌入材料</div>
        <div class="flex-row">
            <div class="input-item"><label>總含水量 %</label><input type="number" id="hydro" value="65" oninput="calculate()"></div>
            <div class="input-item"><label>牛奶 (g)</label><input type="number" id="milk" value="0" oninput="calculate()"></div>
            <div class="input-item"><label>全蛋 (g)</label><input type="number" id="egg" value="0" oninput="calculate()"></div>
            <div class="input-item"><label>油脂 (g)</label><input type="number" id="fat" value="0" oninput="calculate()"></div>
        </div>
        <div class="flex-row">
            <div class="input-item"><label>鹽 (g)</label><input type="number" id="salt" value="6" oninput="calculate()"></div>
            <div class="input-item"><label>糖 (g)</label><input type="number" id="sugar" value="30" oninput="calculate()"></div>
            <div class="input-item" style="flex:1.5;"><label>拌入式餡料總重 (g)</label><input type="number" id="intFillingTotal" value="0" oninput="calculate()"></div>
        </div>
    </div>

    <div class="status-grid">
        <div class="status-card"><div class="status-label">燒減率</div><div id="lossDisp" class="status-value">-- %</div></div>
        <div class="status-card"><div class="status-label">難度/S&F</div><div id="sensory" class="status-value">--</div></div>
        <div class="status-card"><div class="status-label">出缸溫度</div><div id="outTempDisp" class="status-value">-- °C</div></div>
        <div class="status-card" style="grid-column: span 3; background:#e8f5e9; border-color:#a5d6a7;">
            <div class="status-label" style="color:#2e7d32;">一發 (Bulk) 建議時間 <span class="badge" id="bulkDispBadge">-- 分</span></div>
            <button class="timer-btn" id="timerBtn" onclick="startTimer()">⏱️ 開始一發計時</button>
            <div class="timer-display" id="timerDisplay"></div>
        </div>
    </div>

    <div class="result-box">
        <div class="result-item"><span>需添加 **麵粉**:</span><span id="resFlour" class="highlight">--</span></div>
        <div class="result-item"><span>需添加 **純水**:</span><span id="resWater" class="highlight">--</span></div>
        <div id="liquidWarn" class="warn"></div>
        <hr style="border:0.5px solid #ffe0b2;">
        <div class="result-item" style="font-size:0.9rem; font-weight:bold; color:#3e2723;">
            <span>分割麵團 (含拌入): <span id="resSplit" style="color:var(--accent)">--</span> g</span>
            <span>+ 包餡: <span id="resWrap" style="color:var(--accent)">--</span> g</span>
        </div>
        <div class="result-item" style="font-size:0.75rem; opacity:0.8;"><span>下缸總重 (麵團+糖): <span id="resTotal">--</span> g</span></div>
    </div>
</div>

<script>
const presets = {
    baguette: { hydro: 72, poolish: 150, salt: 10, temp: 240, time: 25, mode: 'bake' },
    sourdough: { hydro: 80, levain: 100, salt: 10, temp: 240, time: 40, mode: 'bake', lidded: true },
    toast: { unitWeight: 450, qty: 1, hydro: 70, tangzhong: 40, tzHydro: 500, milk: 50, fat: 30, sugar: 30, salt: 5, temp: 190, time: 35, mode: 'bake' },
    anpan: { unitWeight: 80, wrapFillingPer: 30, hydro: 65, milk: 50, fat: 20, salt: 4, sugar: 40, temp: 180, time: 12, mode: 'bake' },
    mantou: { hydro: 48, milk: 100, fat: 5, salt: 2, sugar: 30, steamTime: 15, mode: 'steam' }
};

function applyPreset() {
    const p = presets[document.getElementById('preset').value];
    if (!p) return;
    if(p.unitWeight !== undefined) document.getElementById('unitWeight').value = p.unitWeight;
    if(p.qty !== undefined) document.getElementById('qty').value = p.qty;
    if(p.wrapFillingPer !== undefined) document.getElementById('wrapFillingPer').value = p.wrapFillingPer;
    
    ['levain','poolish','oldDough','tangzhong','milk','egg','fat','salt','sugar','intFillingTotal'].forEach(k => document.getElementById(k).value = p[k] || 0);
    
    document.getElementById('hydro').value = p.hydro || 70;
    document.getElementById('tzHydro').value = p.tzHydro || 500;

    if (p.mode === 'bake') {
        document.getElementById('modeBake').checked = true;
        document.getElementById('temp').value = p.temp;
        document.getElementById('time').value = p.time;
        document.getElementById('lidded').checked = p.lidded || false;
    } else {
        document.getElementById('modeSteam').checked = true;
        document.getElementById('steamTime').value = p.steamTime;
    }
    toggleMethod();
}

function toggleMethod() {
    const isBake = document.getElementById('modeBake').checked;
    document.getElementById('bakePanel').style.display = isBake ? 'flex' : 'none';
    document.getElementById('steamPanel').style.display = isBake ? 'none' : 'block';
    calculate();
}

let bulkMinutes = 0;

function calculate() {
    const unitW = parseFloat(document.getElementById('unitWeight').value) || 0;
    const qty = parseFloat(document.getElementById('qty').value) || 0;
    const wrapPer = parseFloat(document.getElementById('wrapFillingPer').value) || 0;
    const envT = parseFloat(document.getElementById('envTemp').value) || 26;
    const hydro = parseFloat(document.getElementById('hydro').value) / 100 || 0;
    
    let loss = document.getElementById('modeBake').checked ? ((parseFloat(document.getElementById('temp').value)/100)*(parseFloat(document.getElementById('time').value)/5)+2) : (parseFloat(document.getElementById('steamTime').value)/10 + 1);
    if(document.getElementById('modeBake').checked && document.getElementById('lidded').checked) loss *= 0.65;
    loss = Math.min(Math.max(loss, 1), 28);
    document.getElementById('lossDisp').innerText = loss.toFixed(1) + "%";

    const finishedBreadPart = (unitW * qty) - (wrapPer * qty);
    const rawBreadPartNeeded = finishedBreadPart / (1 - (loss / 100));
    
    const lev = parseFloat(document.getElementById('levain').value) || 0;
    const pol = parseFloat(document.getElementById('poolish').value) || 0;
    const polH = parseFloat(document.getElementById('poolishHydro').value) / 100 || 1;
    const od = parseFloat(document.getElementById('oldDough').value) || 0;
    const odH = parseFloat(document.getElementById('oldDoughHydro').value) / 100 || 0.65;
    
    // 湯種精確計算
    const tzCooked = parseFloat(document.getElementById('tangzhong').value) || 0; // 下缸的熟重
    const tzH = parseFloat(document.getElementById('tzHydro').value) / 100 || 5;

    // 煮湯種生料配方 (假設 10% 水分蒸發)
    const tzRecipeEl = document.getElementById('tzRecipeDisp');
    let tzFlour = 0;
    let tzWaterContributed = 0;

    if (tzCooked > 0) {
        const rawTzTotal = tzCooked / 0.9; // 反推生料總重
        tzFlour = rawTzTotal / (1 + tzH);  // 麵粉不會蒸發，直接算作下缸的麵粉
        const rawTzWater = rawTzTotal - tzFlour; 
        tzWaterContributed = tzCooked - tzFlour; // 實際帶進主麵團的水量 (熟重 - 麵粉重)
        
        tzRecipeEl.innerHTML = `🍳 <b>煮湯種配方 (已計入10%蒸發耗損)：</b><br>準備 <b>麵粉 ${tzFlour.toFixed(1)}g + 水 ${rawTzWater.toFixed(1)}g</b> 煮沸，即可得到 ${tzCooked}g 熟湯種。`;
        tzRecipeEl.style.display = "block";
    } else {
        tzRecipeEl.style.display = "none";
    }

    const milk = parseFloat(document.getElementById('milk').value) || 0;
    const egg = parseFloat(document.getElementById('egg').value) || 0;
    const fat = parseFloat(document.getElementById('fat').value) || 0;
    const salt = parseFloat(document.getElementById('salt').value) || 0;
    const sugar = parseFloat(document.getElementById('sugar').value) || 0;
    const intFilling = parseFloat(document.getElementById('intFillingTotal').value) || 0;

    const fixedNonWater = salt + fat + intFilling + (milk * 0.1) + (egg * 0.25);
    const totalFlour = (rawBreadPartNeeded - fixedNonWater) / (1 + hydro);
    const totalWater = totalFlour * hydro;

    const tzRatio = (tzFlour / totalFlour * 100).toFixed(1);
    const tzSuggestEl = document.getElementById('tzSuggestDisp');
    if (tzCooked > 0) {
        tzSuggestEl.innerHTML = `佔總粉 <b>${tzRatio}%</b>`;
        tzSuggestEl.style.color = (tzRatio > 10 || tzRatio < 3) ? '#d32f2f' : '#2e7d32';
    } else {
        tzSuggestEl.innerText = "建議佔總粉5~10%";
        tzSuggestEl.style.color = "#558b2f";
    }

    // 扣除預發酵種與湯種
    const resFlour = totalFlour - (lev*0.5) - (pol/(1+polH)) - (od/(1+odH)) - tzFlour;
    const resWater = totalWater - (lev*0.5) - (pol - pol/(1+polH)) - (od - od/(1+odH)) - tzWaterContributed - (milk*0.9) - (egg*0.75);

    document.getElementById('resFlour').innerText = Math.max(0, resFlour).toFixed(1) + " g";
    document.getElementById('resWater').innerText = Math.max(0, resWater).toFixed(1) + " g";
    document.getElementById('resSplit').innerText = (rawBreadPartNeeded / qty).toFixed(1);
    document.getElementById('resWrap').innerText = wrapPer.toFixed(1);
    document.getElementById('resTotal').innerText = (rawBreadPartNeeded + sugar).toFixed(1);

    const warn = document.getElementById('liquidWarn');
    if(resWater < 0) { warn.innerText = `⚠️ 液體超標 ${Math.abs(resWater).toFixed(1)}g！請調高含水量。`; warn.style.display="block"; }
    else { warn.style.display="none"; }

    bulkMinutes = Math.round(90 * Math.pow(1.5, (26-envT)/5));
    document.getElementById('bulkDispBadge').innerText = `${bulkMinutes} 分`;
    document.getElementById('sensory').innerText = (hydro > 0.75 ? "★★★★ / 3次" : "★★★ / 1-2次");
    document.getElementById('outTempDisp').innerText = (hydro > 0.72 ? "22-24" : "26-28");
}

let countdownInterval;
function startTimer() {
    if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
    if(bulkMinutes <= 0) return;
    const targetTime = new Date().getTime() + bulkMinutes * 60000;
    const targetTimeStr = new Date(targetTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const display = document.getElementById('timerDisplay');
    const btn = document.getElementById('timerBtn');
    display.style.display = "block";
    btn.innerText = "🔄 重新計時";
    btn.style.background = "#ff9800";
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        const now = new Date().getTime();
        const distance = targetTime - now;
        if (distance <= 0) {
            clearInterval(countdownInterval);
            display.innerText = "✅ 麵團一發已完成！";
            display.style.color = "#2e7d32";
            btn.innerText = "⏱️ 開始一發計時";
            btn.style.background = "#4caf50";
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("🍞 麵團發酵完成！", { body: `您設定的 ${bulkMinutes} 分鐘一發時間已到，可以準備分割囉。`, icon: "bread-icon.png" });
            } else {
                alert(`🍞 麵團發酵完成！設定的 ${bulkMinutes} 分鐘一發時間已到。`);
            }
            return;
        }
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);
        display.innerText = `⏳ 倒數 ${m}分 ${s}秒 (預計 ${targetTimeStr} 完成)`;
        display.style.color = "#d84315";
    }, 1000);
}

calculate();
</script>
</body>
</html>
